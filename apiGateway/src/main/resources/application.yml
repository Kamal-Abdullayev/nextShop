server:
  port: 8080


spring:
  application:
    name: apiGateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: product-service
          uri: lb://nextShop-product
          predicates:
            - Path=/api/v1/**
      discovery:
        locator:
          enabled: true

eureka:
  client:
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true


management:
  endpoints:
    web:
      exposure:
        include: "*"
        exclude: info
