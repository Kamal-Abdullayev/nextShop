version: '3'

services:
  minio:
    image: minio/minio
    ports:
      - "9008:9000"
      - "9009:9001"
    volumes:
      - minio_storage:/data
    environment:
      MINIO_ROOT_USER: nextShop
      MINIO_ROOT_PASSWORD: nextShop
    command: server --console-address ":9001" /data

volumes:
  minio_storage: { }

