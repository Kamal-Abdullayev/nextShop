spring.application.name=nextShop-config-server
server.port=8888

# Cloud config
spring.profiles.active=git
spring.cloud.config.server.git.uri=https://github.com/Kamal-Abdullayev/nextShop-config-server.git
spring.cloud.config.server.git.search-paths=config
spring.cloud.config.server.git.
# Eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${instanceId:${random.uuid}}

logging.level.root=DEBUG

